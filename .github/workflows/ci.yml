name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.x'

# v1 採極簡 4-job CI：typecheck / lint / test-unit / test-e2e（spec 01 §8）。
# 已從 PR gate 移出：schema-check（待 OpenAPI 上線重啟）、audit-deps、audit-licenses、
# build / image-scan（由 cd.yml 負責，避免 CI/CD 重複建 image）。
# E2E webServer 使用 start:e2e（cp static → standalone 目錄後啟動 node standalone server），
# 避免 next start + output:standalone 不相容問題（靜態 JS 不被正確提供，React 無法 hydrate）。
jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  test-unit:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      # Unit / Component 測試 mock 所有外部依賴（Redis、API Server），不需服務
      - run: npm run test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          API_BASE_URL: ${{ secrets.E2E_API_BASE_URL || 'http://localhost:8080' }}
          PUBLIC_ORIGIN: http://localhost:3000
          CLIENT_ID: cms-web
      - name: Run E2E
        run: npm run test:e2e
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          API_BASE_URL: ${{ secrets.E2E_API_BASE_URL || 'http://localhost:8080' }}
          PUBLIC_ORIGIN: http://localhost:3000
          CLIENT_ID: cms-web
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
