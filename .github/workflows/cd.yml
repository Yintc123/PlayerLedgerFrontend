name: CD

# 嚴格規則：CD 只在 CI workflow 成功完成後觸發。
# 不接受 `on: push` 直接觸發，避免繞過 PR gate 與測試。
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

env:
  IMAGE_NAME: igs_frontend

# OIDC（spec 04 §5.2 + ADR 018）：不使用長期 AWS access key。
permissions:
  id-token: write
  contents: read

# 序列化 CD 避免兩次 main push 同時推 image / deploy 撞 ECS rolling update。
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-image:
    runs-on: ubuntu-latest
    # 硬閘門：CI 失敗 / cancelled / skipped 時整條 CD skip
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      image-uri: ${{ steps.image.outputs.uri }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          # 部署 CI 實際測試過的 commit，而非 main 當前 HEAD。
          # 兩者可能不同：CI 跑時是 commit A，但 main 已被 commit B push 覆蓋。
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-,value=${{ github.event.workflow_run.head_sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (with SBOM + provenance)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image URI
        id: image
        run: |
          echo "uri=${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT

  deploy-staging:
    needs: build-image
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/ecs-task-definition.json
          container-name: frontend
          image: ${{ needs.build-image.outputs.image-uri }}

      - name: Deploy to ECS (Staging)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          cluster: igs-staging
          service: frontend
          wait-for-service-stability: true

      - name: Verify staging health
        run: |
          export STAGING_URL="${{ secrets.STAGING_URL }}"
          for i in {1..5}; do
            if curl -sf "$STAGING_URL/api/health" > /dev/null; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i/5 waiting"
            sleep 10
          done
          echo "Staging health check failed"
          exit 1

  deploy-production:
    needs: [build-image, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/ecs-task-definition.json
          container-name: frontend
          image: ${{ needs.build-image.outputs.image-uri }}

      - name: Deploy to ECS (Production)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          cluster: igs-production
          service: frontend
          wait-for-service-stability: true

      - name: Verify production health
        run: |
          export PROD_URL="${{ secrets.PRODUCTION_URL }}"
          for i in {1..5}; do
            if curl -sf "$PROD_URL/api/health" > /dev/null; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i/5 waiting"
            sleep 10
          done
          echo "Production health check failed"
          exit 1

  rollback-on-failure:
    needs: [deploy-production]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get previous task definition and rollback
        run: |
          PREVIOUS_TASK_DEF=$(aws ecs describe-services \
            --cluster igs-production \
            --services frontend \
            --query 'services[0].deployments[1].taskDefinition' \
            --output text)

          if [ -z "$PREVIOUS_TASK_DEF" ] || [ "$PREVIOUS_TASK_DEF" == "None" ]; then
            echo "No previous task definition found; manual rollback required"
            exit 0
          fi

          aws ecs update-service \
            --cluster igs-production \
            --service frontend \
            --task-definition "$PREVIOUS_TASK_DEF"

          echo "Rolled back to: $PREVIOUS_TASK_DEF"
