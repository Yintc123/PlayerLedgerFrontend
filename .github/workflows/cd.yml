name: CD

# CD 觸發來源：
#   1. workflow_run — CI 成功後自動接續（正常路徑）
#   2. workflow_dispatch — Actions UI 手動觸發（workflow_run 延遲 / 排查 / 純 infra 改動時用）
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: igs_frontend

# OIDC（spec 04 §5.2 + ADR 018）：不使用長期 AWS access key。
permissions:
  id-token: write
  contents: read

# 序列化 CD 避免兩次 main push 同時推 image / deploy 撞 ECS rolling update。
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-image:
    runs-on: ubuntu-latest
    # workflow_run：CI 必須 success；workflow_dispatch：手動觸發直接放行
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      image-uri: ${{ steps.image.outputs.uri }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          # 部署 CI 實際測試過的 commit，而非 main 當前 HEAD。
          # 兩者可能不同：CI 跑時是 commit A，但 main 已被 commit B push 覆蓋。
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-,value=${{ github.event.workflow_run.head_sha || github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (with SBOM + provenance)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image URI
        id: image
        run: |
          echo "uri=${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha || github.sha }}" >> $GITHUB_OUTPUT

  deploy-staging:
    needs: build-image
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Substitute placeholders in task definition
        run: |
          sed -i \
            -e "s/ACCOUNT/${{ secrets.AWS_ACCOUNT_ID }}/g" \
            -e "s/REGION/ap-southeast-2/g" \
            -e "s/EC2_PRIVATE_IP/${{ vars.EC2_PRIVATE_IP }}/g" \
            .aws/ecs-task-definition.json

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/ecs-task-definition.json
          container-name: frontend
          image: ${{ needs.build-image.outputs.image-uri }}

      - name: Deploy to ECS (Staging)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          cluster: warmhearted-crocodile-18gqvo-jko-cluster
          service: frontend
          wait-for-service-stability: true

      - name: Verify staging health
        run: |
          export STAGING_URL="http://igs-frontend-alb-1031231573.ap-southeast-2.elb.amazonaws.com"
          for i in {1..5}; do
            if curl -sf "$STAGING_URL/api/health" > /dev/null; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i/5 waiting"
            sleep 10
          done
          echo "Staging health check failed"
          exit 1

  deploy-production:
    needs: [build-image, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Substitute placeholders in task definition
        run: |
          sed -i \
            -e "s/ACCOUNT/${{ secrets.AWS_ACCOUNT_ID }}/g" \
            -e "s/REGION/ap-southeast-2/g" \
            -e "s/EC2_PRIVATE_IP/${{ vars.EC2_PRIVATE_IP }}/g" \
            .aws/ecs-task-definition.json

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/ecs-task-definition.json
          container-name: frontend
          image: ${{ needs.build-image.outputs.image-uri }}

      - name: Deploy to ECS (Production)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          cluster: ${{ vars.PRODUCTION_CLUSTER }}
          service: frontend
          wait-for-service-stability: true

      - name: Verify production health
        run: |
          export PROD_URL="${{ vars.PRODUCTION_URL }}"
          for i in {1..5}; do
            if curl -sf "$PROD_URL/api/health" > /dev/null; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i/5 waiting"
            sleep 10
          done
          echo "Production health check failed"
          exit 1

  rollback-on-failure:
    needs: [deploy-production]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Get previous task definition and rollback
        run: |
          PREVIOUS_TASK_DEF=$(aws ecs describe-services \
            --cluster ${{ vars.PRODUCTION_CLUSTER }} \
            --services frontend \
            --query 'services[0].deployments[1].taskDefinition' \
            --output text)

          if [ -z "$PREVIOUS_TASK_DEF" ] || [ "$PREVIOUS_TASK_DEF" == "None" ]; then
            echo "No previous task definition found; manual rollback required"
            exit 0
          fi

          aws ecs update-service \
            --cluster ${{ vars.PRODUCTION_CLUSTER }} \
            --service frontend \
            --task-definition "$PREVIOUS_TASK_DEF"

          echo "Rolled back to: $PREVIOUS_TASK_DEF"
